name: Autoreview Ship

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number. Defaults to the most recently updated open PR on manual runs.
        required: false
        type: string
        default: ""
      instructions:
        description: Optional instructions for the ship workflow.
        required: false
        type: string
        default: ""
      skills_repository:
        description: Repository containing the shared skills checkout.
        required: false
        type: string
        default: brian-bell/skills
      skills_ref:
        description: Ref to checkout from skills_repository.
        required: false
        type: string
        default: main
      autoreview_model:
        description: Optional Codex model for autoreview.
        required: false
        type: string
        default: ""
      autoreview_thinking:
        description: Optional Codex reasoning effort for autoreview.
        required: false
        type: string
        default: ""
      autoreview_parallel_tests:
        description: Optional test command Codex should run as part of the autoreview gate.
        required: false
        type: string
        default: ""
      codex_version:
        description: Optional @openai/codex version for openai/codex-action.
        required: false
        type: string
        default: ""
      responses_api_endpoint:
        description: Optional Responses API endpoint override for openai/codex-action.
        required: false
        type: string
        default: ""
      post_feedback:
        description: Post the autoreview or Codex result back to the pull request.
        required: false
        type: boolean
        default: true
    secrets:
      OPENAI_API_KEY:
        required: true
      SKILLS_REPOSITORY_TOKEN:
        required: false
    outputs:
      final_message:
        description: The message produced by Codex or by the autoreview gate.
        value: ${{ jobs.ship.outputs.final_message }}
      pr_number:
        description: The resolved pull request number.
        value: ${{ jobs.resolve.outputs.pr_number }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      base_ref: ${{ steps.pr.outputs.base_ref }}
      base_sha: ${{ steps.pr.outputs.base_sha }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      title: ${{ steps.pr.outputs.title }}
      body: ${{ steps.pr.outputs.body }}
      instructions: ${{ steps.pr.outputs.instructions }}
    steps:
      - name: Resolve pull request context
        id: pr
        uses: actions/github-script@v7
        env:
          MANUAL_PR_NUMBER: ${{ inputs.pr_number }}
          MANUAL_INSTRUCTIONS: ${{ inputs.instructions }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let pull;
            let instructions = process.env.MANUAL_INSTRUCTIONS || 'Manual Codex workflow run.';

            if (context.eventName === 'issue_comment') {
              const issue = context.payload.issue;
              if (!issue.pull_request) {
                core.setFailed('Codex can only run from pull request comments.');
                return;
              }
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issue.number,
              });
              pull = response.data;
              instructions = context.payload.comment.body;
            } else if (context.eventName === 'pull_request_review_comment') {
              pull = context.payload.pull_request;
              instructions = context.payload.comment.body;
            } else if (context.eventName === 'pull_request_review') {
              pull = context.payload.pull_request;
              instructions = context.payload.review.body || '';
            } else {
              const manualPr = process.env.MANUAL_PR_NUMBER || '';
              if (manualPr) {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: Number(manualPr),
                });
                pull = response.data;
              } else {
                const pulls = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  per_page: 1,
                  sort: 'updated',
                  direction: 'desc',
                });
                if (pulls.data.length === 0) {
                  core.setFailed('No open pull requests found for manual Codex run.');
                  return;
                }
                pull = pulls.data[0];
              }
            }

            core.setOutput('number', String(pull.number));
            core.setOutput('base_ref', pull.base.ref);
            core.setOutput('base_sha', pull.base.sha);
            core.setOutput('head_ref', pull.head.ref);
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('head_repo', pull.head.repo.full_name);
            core.setOutput('title', pull.title || '');
            core.setOutput('body', pull.body || '');
            core.setOutput('instructions', instructions);

  ship:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    outputs:
      final_message: ${{ steps.post_ship_autoreview.outputs['final-message'] || steps.run_codex.outputs['final-message'] || steps.autoreview_gate.outputs['final-message'] }}
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_ref }}
          fetch-depth: 0

      - name: Checkout shared skills
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.skills_repository }}
          ref: ${{ inputs.skills_ref }}
          path: .skills
          persist-credentials: false
          token: ${{ secrets.SKILLS_REPOSITORY_TOKEN || github.token }}

      - name: Hide shared skills checkout from reviewed repository
        run: echo ".skills/" >> .git/info/exclude

      - name: Bundle skills into Codex homes
        env:
          AUTOREVIEW_CODEX_HOME: ${{ runner.temp }}/codex-autoreview-home
          SHIP_CODEX_HOME: ${{ runner.temp }}/codex-ship-home
        run: |
          set -euo pipefail
          mkdir -p "$AUTOREVIEW_CODEX_HOME/skills" "$SHIP_CODEX_HOME/skills"
          cp -a .skills/catalog/portable/autoreview "$AUTOREVIEW_CODEX_HOME/skills/autoreview"
          cp -a .skills/catalog/portable/commit "$SHIP_CODEX_HOME/skills/commit"
          cp -a .skills/catalog/portable/ship "$SHIP_CODEX_HOME/skills/ship"
          {
            echo "AUTOREVIEW_CODEX_HOME=$AUTOREVIEW_CODEX_HOME"
            echo "Bundled autoreview Codex skills:"
            find "$AUTOREVIEW_CODEX_HOME/skills" -maxdepth 1 -mindepth 1 -type d -print | sort
            echo
            echo "SHIP_CODEX_HOME=$SHIP_CODEX_HOME"
            echo "Bundled ship Codex skills:"
            find "$SHIP_CODEX_HOME/skills" -maxdepth 1 -mindepth 1 -type d -print | sort
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pre-fetch base ref for autoreview
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_BASE_REF: ${{ needs.resolve.outputs.base_ref }}
        run: |
          git -c http.extraheader="AUTHORIZATION: bearer $GITHUB_TOKEN" \
            fetch --no-tags "https://github.com/${{ github.repository }}.git" \
            "+refs/heads/$PR_BASE_REF:refs/remotes/origin/$PR_BASE_REF"

      - name: Prepare Codex for autoreview gates
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_api_endpoint }}
          codex-home: ${{ runner.temp }}/codex-autoreview-home
          codex-version: ${{ inputs.codex_version }}
          safety-strategy: read-only

      - name: Run autoreview gate
        id: autoreview_gate
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-autoreview-home
          CODEX_INTERNAL_ORIGINATOR_OVERRIDE: codex_github_action
          PR_BASE_REF: ${{ needs.resolve.outputs.base_ref }}
          AUTOREVIEW_MODEL: ${{ inputs.autoreview_model }}
          AUTOREVIEW_THINKING: ${{ inputs.autoreview_thinking }}
          AUTOREVIEW_PARALLEL_TESTS: ${{ inputs.autoreview_parallel_tests }}
        run: |
          set -uo pipefail
          reviewed_head="$(git rev-parse HEAD)"
          echo "reviewed-head=$reviewed_head" >> "$GITHUB_OUTPUT"

          log="$RUNNER_TEMP/autoreview-gate.log"
          args=(
            python3 "$CODEX_HOME/skills/autoreview/scripts/autoreview"
            --mode branch
            --base "origin/$PR_BASE_REF"
            --skip-fetch
            --stream-engine-output
          )
          if [ -n "$AUTOREVIEW_MODEL" ]; then
            args+=(--model "$AUTOREVIEW_MODEL")
          fi
          if [ -n "$AUTOREVIEW_THINKING" ]; then
            args+=(--thinking "$AUTOREVIEW_THINKING")
          fi
          if [ -n "$AUTOREVIEW_PARALLEL_TESTS" ]; then
            args+=(--parallel-tests "$AUTOREVIEW_PARALLEL_TESTS")
          fi

          printf 'Running autoreview gate against origin/%s\n\n' "$PR_BASE_REF" | tee "$log"
          "${args[@]}" 2>&1 | tee -a "$log"
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            {
              echo 'final-message<<AUTOREVIEW_MESSAGE'
              echo 'Autoreview gate failed. `$ship` was not run.'
              echo
              echo '```text'
              tail -c 60000 "$log"
              echo
              echo '```'
              echo 'AUTOREVIEW_MESSAGE'
            } >> "$GITHUB_OUTPUT"
          fi

          exit "$status"

      - name: Run Codex ship workflow
        id: run_codex
        uses: openai/codex-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_api_endpoint }}
          codex-home: ${{ runner.temp }}/codex-ship-home
          codex-version: ${{ inputs.codex_version }}
          model: ${{ inputs.autoreview_model }}
          effort: ${{ inputs.autoreview_thinking }}
          sandbox: workspace-write
          prompt: |
            You were invoked from GitHub Actions to run the ship phase of an autoreview-gated workflow.

            Bundled Codex skills are installed in Codex home:
            - $commit
            - $ship

            Follow the repository skill workflows exactly:
            1. The workflow has already run $autoreview against origin/${{ needs.resolve.outputs.base_ref }} and stopped if that gate failed or reported accepted/actionable findings.
            2. Use $ship to commit, push, and create or update the PR as appropriate.
            3. Treat .skills/ as workflow support only; do not stage, commit, edit, or report it as repository work.

            Repository: ${{ github.repository }}
            Pull request: #${{ needs.resolve.outputs.pr_number }}
            Title: ${{ needs.resolve.outputs.title }}

            Pull request body:
            ----
            ${{ needs.resolve.outputs.body }}

            Comment or manual instructions:
            ----
            ${{ needs.resolve.outputs.instructions }}

      - name: Rerun autoreview if Codex changed files
        id: post_ship_autoreview
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-autoreview-home
          CODEX_INTERNAL_ORIGINATOR_OVERRIDE: codex_github_action
          PR_BASE_REF: ${{ needs.resolve.outputs.base_ref }}
          REVIEWED_HEAD: ${{ steps.autoreview_gate.outputs['reviewed-head'] }}
          AUTOREVIEW_MODEL: ${{ inputs.autoreview_model }}
          AUTOREVIEW_THINKING: ${{ inputs.autoreview_thinking }}
          AUTOREVIEW_PARALLEL_TESTS: ${{ inputs.autoreview_parallel_tests }}
        run: |
          set -uo pipefail
          current_head="$(git rev-parse HEAD)"
          if [ "$current_head" = "$REVIEWED_HEAD" ] && [ -z "$(git status --porcelain)" ]; then
            echo "No Codex changes after autoreview gate; no rerun needed."
            exit 0
          fi

          log="$RUNNER_TEMP/post-ship-autoreview-gate.log"
          args=(
            python3 "$CODEX_HOME/skills/autoreview/scripts/autoreview"
            --mode branch
            --base "origin/$PR_BASE_REF"
            --skip-fetch
            --stream-engine-output
          )
          if [ -n "$AUTOREVIEW_MODEL" ]; then
            args+=(--model "$AUTOREVIEW_MODEL")
          fi
          if [ -n "$AUTOREVIEW_THINKING" ]; then
            args+=(--thinking "$AUTOREVIEW_THINKING")
          fi
          if [ -n "$AUTOREVIEW_PARALLEL_TESTS" ]; then
            args+=(--parallel-tests "$AUTOREVIEW_PARALLEL_TESTS")
          fi

          printf 'Rerunning autoreview gate after Codex changed files against origin/%s\n\n' "$PR_BASE_REF" | tee "$log"
          "${args[@]}" 2>&1 | tee -a "$log"
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            {
              echo 'final-message<<AUTOREVIEW_MESSAGE'
              echo 'Post-ship autoreview gate failed after Codex changed files.'
              echo
              echo '```text'
              tail -c 60000 "$log"
              echo
              echo '```'
              echo 'AUTOREVIEW_MESSAGE'
            } >> "$GITHUB_OUTPUT"
          fi

          exit "$status"

  post_feedback:
    runs-on: ubuntu-latest
    needs:
      - resolve
      - ship
    if: always() && inputs.post_feedback && needs.resolve.outputs.pr_number != '' && needs.ship.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex response
        uses: actions/github-script@v7
        env:
          FINAL_MESSAGE: ${{ needs.ship.outputs.final_message }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.FINAL_MESSAGE,
            });

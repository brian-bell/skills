name: Codex

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  codex:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex') && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@codex') && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve pull request context
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let pull;
            let instructions = 'Manual Codex workflow run. Inspect the repository and summarize anything notable.';

            if (context.eventName === 'issue_comment') {
              const issue = context.payload.issue;
              if (!issue.pull_request) {
                core.setFailed('Codex can only run from pull request comments.');
                return;
              }
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issue.number,
              });
              pull = response.data;
              instructions = context.payload.comment.body;
            } else if (context.eventName === 'pull_request_review_comment') {
              pull = context.payload.pull_request;
              instructions = context.payload.comment.body;
            } else if (context.eventName === 'pull_request_review') {
              pull = context.payload.pull_request;
              instructions = context.payload.review.body || '';
            } else {
              const pulls = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 1,
                sort: 'updated',
                direction: 'desc',
              });
              if (pulls.data.length === 0) {
                core.setFailed('No open pull requests found for manual Codex run.');
                return;
              }
              pull = pulls.data[0];
            }

            core.setOutput('number', String(pull.number));
            core.setOutput('base_ref', pull.base.ref);
            core.setOutput('base_sha', pull.base.sha);
            core.setOutput('head_ref', pull.head.ref);
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('title', pull.title || '');
            core.setOutput('body', pull.body || '');
            core.setOutput('instructions', instructions);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You were invoked from a GitHub pull request comment that mentioned @codex.

            Follow the user's instructions from the comment. If the request is ambiguous,
            answer with a concise clarification instead of making assumptions.

            Repository: ${{ github.repository }}
            Pull request: #${{ steps.pr.outputs.number }}
            Title: ${{ steps.pr.outputs.title }}

            Review only the changes introduced by this pull request:
            git log --oneline ${{ steps.pr.outputs.base_sha }}...${{ steps.pr.outputs.head_sha }}

            Pull request body:
            ----
            ${{ steps.pr.outputs.body }}

            Comment instructions:
            ----
            ${{ steps.pr.outputs.instructions }}

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != '' && needs.codex.outputs.pr_number != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex response
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
